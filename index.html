<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engajamentes — Meta Ads Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#08070E;--surface:#0F0D1A;--surface-alt:#161326;--surface-hover:#1E1A34;--border:#262044;--border-light:#362E5C;--purple:#7C3AED;--purple-dark:#5B21B6;--purple-glow:rgba(124,58,237,.12);--purple-soft:#A78BFA;--gold:#D4AF37;--gold-deep:#B8952F;--gold-glow:rgba(212,175,55,.10);--green:#22C97A;--green-bg:rgba(34,201,122,.08);--red:#EF4444;--red-bg:rgba(239,68,68,.08);--cyan:#22D3EE;--orange:#F97316;--text:#FFFFFF;--text-soft:#C4B5E2;--text-dim:#6E5D94;--font:'Outfit',sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:10px}
input:focus,select:focus{outline:none;border-color:var(--purple)!important}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(212,175,55,.05) 0%,transparent 50%),var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:420px;max-width:92vw;text-align:center;box-shadow:0 0 80px rgba(124,58,237,.06)}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.brand-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--purple),var(--gold));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff}
.brand-name{font-size:24px;font-weight:900;letter-spacing:.03em}.brand-name .nm{color:var(--purple-soft)}.brand-name .es{color:var(--gold)}
.brand-sub{font-size:11px;color:var(--text-dim);font-weight:500;margin-bottom:28px;letter-spacing:.06em;text-transform:uppercase}
.login-box input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface-alt);color:var(--text);font-size:14px;font-family:var(--font);margin-bottom:12px;transition:border-color .2s}
.btn-main{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:#fff;font-size:14px;font-weight:700;font-family:var(--font);margin-top:6px;transition:opacity .2s}
.btn-main:hover{opacity:.9}.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-link{background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;font-family:var(--font);margin-top:16px;font-weight:600}
.msg-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;font-weight:600}
.msg-ok{color:var(--green);font-size:13px;margin-top:10px;min-height:20px;font-weight:600}
.status-bar{margin-top:16px;padding:12px;border-radius:10px;background:var(--surface-alt);border:1px solid var(--border);text-align:left}
.st{font-size:11px;margin:3px 0;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.st-ok{color:var(--green)}.st-fail{color:var(--red)}.st-wait{color:var(--gold)}
.dot-g{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot-r{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.dot-y{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
.debug-panel{margin-top:10px;padding:10px;border-radius:8px;background:#1a0a0a;border:1px solid #5c1a1a;text-align:left;display:none;max-height:200px;overflow:auto}
.debug-panel.show{display:block}
.debug-panel pre{font-size:10px;color:#ff9999;font-family:var(--mono);white-space:pre-wrap;word-break:break-all}
#dashboard{display:none;min-height:100vh}#dashboard.active{display:flex}
.sidebar{width:264px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;overflow:hidden}.sidebar.closed{width:0}
.sb-head{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:38px;height:38px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--purple),var(--gold));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff}
.sb-title{font-size:14px;font-weight:800;letter-spacing:.03em}.sb-sub{font-size:9px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.sb-clients{flex:1;overflow-y:auto;padding:14px 10px}
.sb-label{font-size:9px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:0 8px;margin-bottom:10px}
.c-btn{width:100%;text-align:left;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--text-soft);font-weight:500;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;border-left:3px solid transparent;display:flex;align-items:center;gap:9px}
.c-btn:hover{background:var(--surface-hover)}.c-btn.active{background:var(--purple-glow);color:var(--purple-soft);font-weight:700;border-left-color:var(--purple)}
.c-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0}.c-btn.active .c-dot{background:var(--purple);box-shadow:0 0 6px var(--purple)}
.sb-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn-gold{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#0A0814;font-weight:700;font-size:12px;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-purple{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:#fff;font-weight:700;font-size:12px;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-o{padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-soft);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-o:hover{border-color:var(--purple);color:var(--purple-soft)}.btn-o.on{border-color:var(--purple);color:var(--purple-soft);background:var(--purple-glow)}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.m-head{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.m-head .left{display:flex;align-items:center;gap:12px}.m-toggle{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-soft);padding:6px 10px;cursor:pointer;font-size:18px}
.m-head h1{font-size:18px;font-weight:800}.m-sub{font-size:11px;color:var(--text-dim)}
.views{display:flex;gap:5px;flex-wrap:wrap}.m-right{display:flex;align-items:center;gap:10px}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);padding:6px 12px;cursor:pointer;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:4px}.btn-logout:hover{border-color:var(--red);color:var(--red)}
.content{padding:18px 24px;display:flex;flex-direction:column;gap:18px}.filter-bar{display:flex;gap:5px;flex-wrap:wrap}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:5px;transition:border-color .25s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--gold));opacity:0;transition:opacity .25s}.mc:hover{border-color:var(--gold-deep)}.mc:hover::before{opacity:1}
.mc-top{display:flex;justify-content:space-between;align-items:center}.mc-label{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em}.mc-icon{font-size:18px;color:var(--gold)}
.mc-val{font-size:22px;font-weight:700;font-family:var(--mono)}
.mc-chg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;width:fit-content}.mc-chg.up{color:var(--green);background:var(--green-bg)}.mc-chg.dn{color:var(--red);background:var(--red-bg)}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:14px}.cb{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}.cb h3{font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:12px}.cb canvas{width:100%!important;max-height:240px}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}.tw-h{padding:14px 18px;border-bottom:1px solid var(--border)}.tw-h h3{font-size:12px;font-weight:700;color:var(--text-soft)}
.tw table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}.tw thead tr{background:var(--surface-alt)}.tw th{padding:10px 14px;text-align:left;color:var(--text-dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}.tw td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-soft)}.tw tbody tr:hover{background:var(--surface-hover)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px)}.mo.show{display:flex}
.mb{background:var(--surface);border:1px solid var(--border-light);border-radius:18px;padding:30px 32px;width:440px;max-width:92vw}.mb h2{font-size:17px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:8px}.mb h2 i{color:var(--gold)}.mb p{font-size:12px;color:var(--text-dim);margin-bottom:18px;line-height:1.5}
.mb input[type=text],.mb select{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface-alt);color:var(--text);font-size:13px;font-family:var(--font);margin-bottom:10px}.mb select option{background:var(--surface)}
.mb .bf{width:100%;padding:12px;border-radius:10px;border:1px solid var(--purple);background:var(--purple-glow);color:var(--purple-soft);font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.mb .bc{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--font);margin-top:6px}
@media(max-width:800px){.sidebar{position:fixed;z-index:100;height:100vh}.cr{grid-template-columns:1fr}.mg{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="brand"><div class="brand-icon">E</div><div class="brand-name"><span class="nm">Engaja</span><span class="es">mentes</span></div></div>
    <div class="brand-sub">Meta Ads Dashboard</div>
    <input type="email" id="l-email" placeholder="E-mail">
    <input type="password" id="l-pass" placeholder="Senha">
    <button class="btn-main" id="btn-login">Entrar</button>
    <button class="btn-link" id="btn-toggle-auth">Criar conta</button>
    <div class="msg-err" id="msg-err"></div>
    <div class="msg-ok" id="msg-ok"></div>
    <div class="status-bar" id="status-bar">
      <div class="st" id="st-js"><span class="dot-y"></span> Verificando JS...</div>
      <div class="st" id="st-supa"><span class="dot-y"></span> Verificando Supabase...</div>
      <div class="st" id="st-auth"><span class="dot-y"></span> Aguardando...</div>
    </div>
    <div class="debug-panel" id="debug-panel"><pre id="debug-text"></pre></div>
  </div>
</div>
<div id="dashboard">
  <div class="sidebar" id="sidebar"><div class="sb-head"><div class="sb-logo">E</div><div><div class="sb-title">ENGAJAMENTES</div><div class="sb-sub">Meta Ads Manager</div></div></div><div class="sb-clients"><div class="sb-label">Clientes</div><div id="client-list"></div></div><div class="sb-foot"><button class="btn-gold" id="btn-import"><i class="bx bx-upload"></i> Importar CSV</button><button class="btn-purple" id="btn-pdf"><i class="bx bx-file"></i> Gerar PDF</button></div></div>
  <div class="main"><div class="m-head"><div class="left"><button class="m-toggle" id="btn-sidebar"><i class="bx bx-menu"></i></button><div><h1 id="c-title">—</h1><div class="m-sub"><i class="bx bxl-meta" style="font-size:13px;vertical-align:middle;margin-right:2px"></i> Meta Ads</div></div></div><div class="m-right"><div class="views" id="view-btns"></div><button class="btn-logout" id="btn-logout"><i class="bx bx-log-out"></i> Sair</button></div></div>
  <div class="content"><div class="filter-bar" id="fbar"></div><div class="mg" id="metrics"></div><div class="cr"><div class="cb"><h3 id="t-inv">Investimento</h3><canvas id="ch-inv"></canvas></div><div class="cb"><h3 id="t-roas">ROAS</h3><canvas id="ch-roas"></canvas></div></div><div class="cr"><div class="cb"><h3>CPA</h3><canvas id="ch-cpa"></canvas></div><div class="cb"><h3>Conversoes</h3><canvas id="ch-conv"></canvas></div></div><div class="cr"><div class="cb"><h3>Distribuicao</h3><canvas id="ch-pie"></canvas></div><div class="cb"><h3>CTR</h3><canvas id="ch-ctr"></canvas></div></div><div class="tw"><div class="tw-h"><h3 id="tb-title">Dados</h3></div><div style="overflow-x:auto"><table id="dtable"><thead></thead><tbody></tbody></table></div></div></div></div>
</div>
<div class="mo" id="import-modal"><div class="mb"><h2><i class="bx bx-cloud-upload"></i> Importar CSV</h2><p>Selecione o cliente ou crie novo.</p><label style="font-size:11px;color:var(--text-dim);font-weight:600;display:block;margin-bottom:4px">Para qual cliente?</label><select id="imp-sel"><option value="__new">+ Novo cliente</option></select><input type="text" id="imp-name" placeholder="Nome do novo cliente"><input type="file" id="imp-file" accept=".csv,.tsv,.txt" style="display:none"><button class="bf" id="btn-file"><i class="bx bx-cloud-upload"></i> Selecionar CSV</button><button class="bc" id="btn-cancel-imp">Cancelar</button></div></div>

<script>
/* ==== DIAGNOSTICO ==== */
document.getElementById('st-js').innerHTML='<span class="dot-g"></span> <span class="st-ok">JavaScript OK</span>';

var supabase=null;
try{
  if(!window.supabase||!window.supabase.createClient)throw new Error('Lib Supabase nao carregou');
  supabase=window.supabase.createClient(
    'https://czyzhwcrhiahfqrfykbz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6eXpod2NyaGlhaGZxcmZ5a2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDU0NDgsImV4cCI6MjA4OTMyMTQ0OH0.wBhkxtjd2hsk75r4phjR3_NjVn3Zij-nrznI6zYClgA'
  );
  document.getElementById('st-supa').innerHTML='<span class="dot-g"></span> <span class="st-ok">Supabase inicializado</span>';
}catch(e){
  document.getElementById('st-supa').innerHTML='<span class="dot-r"></span> <span class="st-fail">ERRO: '+e.message+'</span>';
}

var currentUser=null,clients={},activeId=null,curView='semanal',selAd='todos',CI={},isSignUp=false;
function $(id){return document.getElementById(id)}
function showDebug(t){$('debug-panel').classList.add('show');$('debug-text').textContent=typeof t==='string'?t:JSON.stringify(t,null,2)}

/* ==== AUTH HANDLERS ==== */
$('btn-toggle-auth').onclick=function(){
  isSignUp=!isSignUp;
  $('btn-toggle-auth').textContent=isSignUp?'Ja tenho conta':'Criar conta';
  $('btn-login').textContent=isSignUp?'Cadastrar':'Entrar';
  $('msg-err').textContent='';$('msg-ok').textContent='';
};
$('l-pass').onkeydown=function(e){if(e.key==='Enter')doLogin()};
$('l-email').onkeydown=function(e){if(e.key==='Enter')$('l-pass').focus()};
$('btn-login').onclick=doLogin;
$('btn-logout').onclick=function(){if(supabase)supabase.auth.signOut()};
$('st-auth').innerHTML='<span class="dot-g"></span> <span class="st-ok">Handlers prontos</span>';

async function doLogin(){
  var email=$('l-email').value.trim(),pass=$('l-pass').value;
  $('msg-err').textContent='';$('msg-ok').textContent='';$('debug-panel').classList.remove('show');
  if(!email){$('msg-err').textContent='Digite seu e-mail.';return}
  if(!pass){$('msg-err').textContent='Digite sua senha.';return}
  if(pass.length<6){$('msg-err').textContent='Senha min 6 caracteres.';return}
  if(!supabase){$('msg-err').textContent='Supabase nao conectado!';return}
  $('btn-login').disabled=true;$('btn-login').textContent='Conectando...';
  $('st-auth').innerHTML='<span class="dot-y"></span> <span class="st-wait">Autenticando...</span>';
  try{
    var r;
    if(isSignUp){r=await supabase.auth.signUp({email:email,password:pass})}
    else{r=await supabase.auth.signInWithPassword({email:email,password:pass})}
    showDebug({acao:isSignUp?'CADASTRO':'LOGIN',temErro:!!r.error,erro:r.error?{msg:r.error.message,status:r.error.status,code:r.error.code}:null,temSessao:!!(r.data&&r.data.session),temUser:!!(r.data&&r.data.user),email:r.data&&r.data.user?r.data.user.email:null,confirmado:r.data&&r.data.user?r.data.user.confirmed_at:null});
    if(r.error){
      var m=r.error.message||'',lo=m.toLowerCase();
      if(lo.indexOf('invalid login')>=0||lo.indexOf('invalid_credentials')>=0)$('msg-err').textContent='E-mail ou senha incorretos.';
      else if(lo.indexOf('email not confirmed')>=0)$('msg-err').textContent='Confirme seu e-mail primeiro (verifique caixa de entrada e spam).';
      else if(lo.indexOf('already registered')>=0)$('msg-err').textContent='E-mail ja cadastrado.';
      else if(lo.indexOf('captcha')>=0)$('msg-err').textContent='CAPTCHA ativo! Desative em Supabase > Auth > Bot Protection.';
      else if(lo.indexOf('rate limit')>=0)$('msg-err').textContent='Muitas tentativas. Aguarde 1 min.';
      else $('msg-err').textContent='Erro: '+m;
      $('st-auth').innerHTML='<span class="dot-r"></span> <span class="st-fail">'+m.substring(0,50)+'</span>';
    }else if(isSignUp&&r.data&&r.data.user&&!r.data.session){
      $('msg-ok').textContent='Conta criada! Verifique seu e-mail para confirmar.';
      $('st-auth').innerHTML='<span class="dot-y"></span> <span class="st-wait">Aguardando confirmacao email</span>';
    }else if(r.data&&r.data.session){
      $('msg-ok').textContent='Conectado!';
      $('st-auth').innerHTML='<span class="dot-g"></span> <span class="st-ok">OK</span>';
    }else{
      $('msg-err').textContent='Resposta inesperada.';
    }
  }catch(e){
    $('msg-err').textContent='Erro: '+e.message;
    showDebug({exception:e.message,stack:e.stack});
  }
  $('btn-login').disabled=false;$('btn-login').textContent=isSignUp?'Cadastrar':'Entrar';
}

/* ==== AUTH STATE ==== */
if(supabase){supabase.auth.onAuthStateChange(function(ev,session){
  currentUser=session?session.user:null;
  if(currentUser){$('login-screen').style.display='none';$('dashboard').classList.add('active');loadClients()}
  else{$('login-screen').style.display='flex';$('dashboard').classList.remove('active');clients={};activeId=null}
})}

/* ==== DB ==== */
async function loadClients(){
  try{
    var r=await supabase.from('clients').select('id,name,data').eq('user_id',currentUser.id).order('created_at',{ascending:true});
    if(r.error){if(r.error.message&&r.error.message.indexOf('does not exist')>=0)alert('Tabela "clients" nao existe! Rode o CREATE TABLE no SQL Editor.');throw r.error}
    clients={};(r.data||[]).forEach(function(d){clients[d.id]={name:d.name,data:d.data||[]}});
    if(!Object.keys(clients).length){await seedDemo();return loadClients()}
    if(!activeId||!clients[activeId])activeId=Object.keys(clients)[0];
  }catch(e){console.warn('Fallback local:',e.message);if(!Object.keys(clients).length)loadLocal()}
  renderSidebar();renderAll()
}
async function saveClient(nm,dt,id){
  try{if(id&&clients[id]){await supabase.from('clients').update({name:nm,data:dt}).eq('id',id);clients[id]={name:nm,data:dt};return id}
  else{var r=await supabase.from('clients').insert({user_id:currentUser.id,name:nm,data:dt}).select().single();if(r.data){clients[r.data.id]={name:nm,data:r.data.data};return r.data.id}}}
  catch(e){console.warn('save fallback:',e)}var lid='l'+Date.now();clients[lid]={name:nm,data:dt};return lid}
